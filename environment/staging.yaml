## Staging environment configuration for open-finance-nextgen-ui
## These values are passed to the Helm chart via drone-helm

env:
  NODE_ENV: staging
  ## Backend service URLs (in-cluster DNS names from Kanopy)
  CORE_BACKEND_URL: http://open-finance-next-gen-web-app:80
  CHATBOT_BACKEND_URL: http://openfinance-chatbot-web-app:80

## Uncomment and configure if you need Kubernetes secrets injected as env vars
## The secret name must match an existing K8s secret in the industrysolutions namespace
# envSecrets:
#   MONGODB_URI: open-finance-nextgen-ui-secrets
#   DATABASE_NAME: open-finance-nextgen-ui-secrets

## AWS IRSA (IAM Roles for Service Accounts) — uncomment if needed
# serviceAccount:
#   enabled: true
#   irsa:
#     accountId: "275662791714"
#     roleName: "kanopy-staging-cicd-irsa"
